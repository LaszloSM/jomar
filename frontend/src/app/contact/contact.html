<section id="contact" class="contact-premium">
	<div class="container-custom">
		<div class="contact-layout">
			<!-- Left Column: Info -->
			<div class="contact-info">
				<div class="section-label animate-on-scroll">
					<span class="section-label-icon">✦</span>
					<span>Contacto</span>
				</div>
				
				<h2 class="section-title animate-on-scroll">
					Hablemos de tu <span class="text-gradient">Proyecto</span>
				</h2>
				
				<p class="contact-subtitle animate-on-scroll">
					¿Tienes preguntas o necesitas una cotización? Estamos aquí para ayudarte 
					a encontrar la mejor solución logística para tu negocio.
				</p>

				<!-- Contact Methods -->
				<div class="contact-methods">
					<div class="contact-method-card animate-on-scroll animate-delay-100">
						<div class="contact-method-icon">
							<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
								<polyline points="22,6 12,13 2,6"></polyline>
							</svg>
						</div>
						<div class="contact-method-content">
							<div class="contact-method-label">Email</div>
							<a href="mailto:info@jomar.com" class="contact-method-value">info@jomar.com</a>
						</div>
					</div>

					<div class="contact-method-card animate-on-scroll animate-delay-200">
						<div class="contact-method-icon contact-method-icon-accent">
							<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
							</svg>
						</div>
						<div class="contact-method-content">
							<div class="contact-method-label">Teléfono</div>
							<a href="tel:+573001234567" class="contact-method-value">+57 300 123 4567</a>
						</div>
					</div>

					<div class="contact-method-card animate-on-scroll animate-delay-300">
						<div class="contact-method-icon contact-method-icon-secondary">
							<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
								<circle cx="12" cy="10" r="3"></circle>
							</svg>
						</div>
						<div class="contact-method-content">
							<div class="contact-method-label">Ubicación</div>
							<div class="contact-method-value">La Guajira, Colombia</div>
						</div>
					</div>
				</div>

				<!-- Social Links -->
				<div class="contact-social animate-on-scroll animate-delay-400">
					<a href="#" class="contact-social-link" aria-label="Facebook">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
							<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
						</svg>
					</a>
					<a href="#" class="contact-social-link" aria-label="Instagram">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
							<path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
						</svg>
					</a>
					<a href="#" class="contact-social-link" aria-label="LinkedIn">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
							<path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
						</svg>
					</a>
				</div>
			</div>

			<!-- Right Column: Form -->
			<div class="contact-form-wrapper animate-on-scroll animate-delay-200">
				<form class="contact-form card-glass">
					<div class="form-group">
						<label for="name" class="label-premium">Nombre Completo</label>
						<input 
							type="text" 
							id="name" 
							name="name"
							class="input-premium" 
							placeholder="Juan Pérez"
							required 
						/>
					</div>

					<div class="form-group">
						<label for="email" class="label-premium">Correo Electrónico</label>
						<input 
							type="email" 
							id="email"
							name="email"
							class="input-premium" 
							placeholder="juan@empresa.com"
							required 
						/>
					</div>

					<div class="form-group">
						<label for="phone" class="label-premium">Teléfono (Opcional)</label>
						<input 
							type="tel" 
							id="phone"
							name="phone"
							class="input-premium" 
							placeholder="+57 300 123 4567"
						/>
					</div>

					<div class="form-group">
						<label for="service" class="label-premium">Servicio de Interés</label>
						<select id="service" name="service" class="input-premium select-premium">
							<option value="">Selecciona un servicio</option>
							<option value="institucional">Suministros Institucionales</option>
							<option value="general">Servicios Generales</option>
							<option value="logistica">Logística y Distribución</option>
							<option value="complementarios">Servicios Complementarios</option>
						</select>
					</div>

					<div class="form-group">
						<label for="message" class="label-premium">Mensaje</label>
						<textarea 
							id="message"
							name="message"
							class="input-premium textarea-premium" 
							placeholder="Cuéntanos sobre tu proyecto o necesidad..."
							required
						></textarea>
					</div>

					<button type="submit" class="btn-primary btn-form">
						<span>Enviar Mensaje</span>
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
							<line x1="22" y1="2" x2="11" y2="13"></line>
							<polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
						</svg>
					</button>
				</form>
			</div>
		</div>
	</div>

	<!-- Background Pattern -->
	<div class="contact-bg-pattern wayuu-zigzag"></div>
</section>
