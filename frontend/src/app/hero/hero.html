<section id="hero" class="hero-premium">
	<!-- Animated Background Layers -->
	<div class="hero-bg-layer hero-bg-image" [ngStyle]="{ 'background-image': 'url(' + heroImage + ')' }"></div>
	
	<!-- Clean Gradient Overlay -->
	<div class="hero-bg-layer hero-overlay">
		<div class="hero-gradient"></div>
	</div>

	<!-- Floating Elements (Decorative) -->
	<div class="hero-floating-elements">
		<div class="floating-circle floating-circle-1"></div>
		<div class="floating-circle floating-circle-2"></div>
		<div class="floating-circle floating-circle-3"></div>
	</div>

	<!-- Content -->
	<div class="hero-content">
		<div class="container-custom">
			<div class="hero-content-wrapper">
				<!-- Badge -->
				<div class="hero-badge">
					<span class="hero-badge-icon">✦</span>
					<span>Excelencia en Logística desde 2010</span>
				</div>

				<!-- Main Title with staggered animation -->
				<h1 class="hero-title">
					<span class="hero-title-line animate-fadeInUp">Soluciones Logísticas</span>
					<span class="hero-title-line animate-fadeInUp animate-delay-100">Integrales para</span>
					<span class="hero-title-line hero-title-highlight animate-fadeInUp animate-delay-200">
						Empresas y Proyectos
					</span>
				</h1>

				<!-- Subtitle -->
				<p class="hero-subtitle animate-fadeInUp animate-delay-300">
					Compromiso, calidad y confianza en todo lo que hacemos.<br/>
					Transformando la logística con innovación y experiencia.
				</p>

				<!-- CTAs with premium effects -->
				<div class="hero-cta-group animate-fadeInUp animate-delay-400">
					<button (click)="scrollToSection('services')" class="btn-primary btn-hero">
						<span>Conocer Servicios</span>
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
							<line x1="5" y1="12" x2="19" y2="12"></line>
							<polyline points="12 5 19 12 12 19"></polyline>
						</svg>
					</button>
					
					<button (click)="scrollToSection('contact')" class="btn-secondary btn-hero">
						<span>Solicitar Cotización</span>
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
						</svg>
					</button>
				</div>

				<!-- Stats / Trust Indicators -->
				<div class="hero-stats animate-fadeInUp animate-delay-500">
					<div class="hero-stat">
						<div class="hero-stat-value">15+</div>
						<div class="hero-stat-label">Años de Experiencia</div>
					</div>
					<div class="hero-stat-divider"></div>
					<div class="hero-stat">
						<div class="hero-stat-value">500+</div>
						<div class="hero-stat-label">Proyectos Exitosos</div>
					</div>
					<div class="hero-stat-divider"></div>
					<div class="hero-stat">
						<div class="hero-stat-value">100%</div>
						<div class="hero-stat-label">Satisfacción</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Scroll Indicator with premium animation -->
	<div class="hero-scroll-indicator">
		<div class="scroll-indicator-wrapper">
			<div class="scroll-indicator-mouse">
				<div class="scroll-indicator-wheel"></div>
			</div>
			<span class="scroll-indicator-text">Scroll</span>
		</div>
	</div>
</section>
