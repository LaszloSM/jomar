<header class="header-premium" [ngClass]="{'header-scrolled': isScrolled}">
	<div class="container-custom">
		<div class="header-content">
			<!-- Logo with micro-interaction -->
			<div class="header-logo" (click)="scrollToSection('hero')" title="JOMAR - Volver al inicio">
				<img src="/assets/JOMAR_Logo.jpeg" alt="JOMAR Logo" class="logo-image" />
			</div>

			<!-- Desktop Navigation -->
			<nav class="nav-desktop">
				<ng-container *ngFor="let item of menuItems; let i = index">
					<!-- Regular menu item -->
					<button 
						*ngIf="!item.hasDropdown"
						(click)="scrollToSection(item.id)"
						class="nav-link"
						[style.animation-delay]="(i * 50) + 'ms'">
						<span class="nav-link-text">{{ item.label }}</span>
						<span class="nav-link-indicator"></span>
					</button>
					
					<!-- Dropdown menu item -->
					<div 
						*ngIf="item.hasDropdown" 
						class="nav-dropdown"
						(mouseenter)="toggleDropdown(item.label)"
						(mouseleave)="closeDropdown()">
						<button 
							class="nav-link"
							[class.active]="isDropdownOpen(item.label)"
							[style.animation-delay]="(i * 50) + 'ms'">
							<span class="nav-link-text">{{ item.label }}</span>
							<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-dropdown-icon">
								<polyline points="6 9 12 15 18 9"></polyline>
							</svg>
							<span class="nav-link-indicator"></span>
						</button>
						
						<div class="nav-dropdown-menu" *ngIf="isDropdownOpen(item.label)">
							<button 
								*ngFor="let subitem of item.submenu"
								(click)="scrollToSection(subitem.id); closeDropdown()"
								class="nav-dropdown-item">
								{{ subitem.label }}
							</button>
						</div>
					</div>
				</ng-container>
			</nav>

			<!-- CTA Button -->
			<div class="header-cta">
				<button 
					*ngIf="isAuthenticated; else loginBtn" 
					(click)="onDashboardClick()" 
					class="btn-primary btn-header">
					<span class="btn-icon">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
							<circle cx="12" cy="7" r="4"></circle>
						</svg>
					</span>
					<span>Mi Panel</span>
				</button>
				<ng-template #loginBtn>
					<button (click)="onLoginClick()" class="btn-primary btn-header">
						<span class="btn-icon">
							<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
								<polyline points="10 17 15 12 10 7"></polyline>
								<line x1="15" y1="12" x2="3" y2="12"></line>
							</svg>
						</span>
						<span>Iniciar Sesión</span>
					</button>
				</ng-template>
			</div>

			<!-- Mobile Menu Toggle -->
			<button class="mobile-menu-toggle" (click)="toggleMobileMenu()" aria-label="Toggle menu">
				<span class="hamburger-line" [ngClass]="{'active': isMobileMenuOpen}"></span>
				<span class="hamburger-line" [ngClass]="{'active': isMobileMenuOpen}"></span>
				<span class="hamburger-line" [ngClass]="{'active': isMobileMenuOpen}"></span>
			</button>
		</div>

		<!-- Mobile Menu Overlay -->
		<div *ngIf="isMobileMenuOpen" class="mobile-menu" [@mobileMenuAnimation]>
			<nav class="mobile-nav">
				<ng-container *ngFor="let item of menuItems; let i = index">
					<!-- Regular menu item -->
					<button 
						*ngIf="!item.hasDropdown"
						(click)="scrollToSection(item.id)"
						class="mobile-nav-link"
						[style.animation-delay]="(i * 50) + 'ms'">
						<span class="mobile-nav-icon">→</span>
						<span>{{ item.label }}</span>
					</button>
					
					<!-- Dropdown menu item for mobile -->
					<div *ngIf="item.hasDropdown" class="mobile-nav-dropdown">
						<button 
							(click)="toggleDropdown(item.label)"
							class="mobile-nav-link"
							[class.active]="isDropdownOpen(item.label)"
							[style.animation-delay]="(i * 50) + 'ms'">
							<span class="mobile-nav-icon">→</span>
							<span>{{ item.label }}</span>
							<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mobile-dropdown-icon" [class.rotated]="isDropdownOpen(item.label)">
								<polyline points="6 9 12 15 18 9"></polyline>
							</svg>
						</button>
						
						<div class="mobile-dropdown-menu" *ngIf="isDropdownOpen(item.label)">
							<button 
								*ngFor="let subitem of item.submenu"
								(click)="scrollToSection(subitem.id); closeDropdown()"
								class="mobile-dropdown-item">
								{{ subitem.label }}
							</button>
						</div>
					</div>
				</ng-container>
				
				<div class="mobile-nav-divider"></div>
				
				<button 
					*ngIf="isAuthenticated; else mobileLoginBtn" 
					(click)="onDashboardClick()" 
					class="btn-primary mobile-nav-cta">
					Mi Panel
				</button>
				<ng-template #mobileLoginBtn>
					<button (click)="onLoginClick()" class="btn-primary mobile-nav-cta">
						Iniciar Sesión
					</button>
				</ng-template>
			</nav>
		</div>
	</div>
</header>
